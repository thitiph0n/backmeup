version: "2"

run:
  go: "1.26"
  timeout: 5m

linters:
  disable:
    - errcheck
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - bodyclose

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
  exclude-dirs:
    - ittest
    - example
    - docs
