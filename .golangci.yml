version: "2"

run:
  timeout: 5m

linters:
  disable:
    - errcheck
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - bodyclose
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - errcheck
    paths:
      - ittest
      - example
      - docs
